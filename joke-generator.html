<!DOCTYPE html>
<html>
<head>
    <title>Joke Generator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .container { background: rgba(0,0,0,0.3); padding: 40px; border-radius: 10px; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #764ba2; }
        #joke { margin: 20px 0; font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <button onclick="getJoke()">Get Joke</button>
        <div id="joke">Click the button to get a joke!</div>
    </div>

    <script>
        function getJoke() {
            fetch('https://official-joke-api.appspot.com/random_joke')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('joke').innerHTML = `<strong>${data.setup}</strong><br><br>${data.punchline}`;
                })
                .catch(error => {
                    document.getElementById('joke').innerHTML = 'Error fetching joke. Try again!';
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
